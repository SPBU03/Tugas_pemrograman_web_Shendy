<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALAMAN MASUK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS RESET & GENERAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            width: 100%;
            min-height: 100vh;
            /* Gradient background sesuai kode kamu */
            background: linear-gradient(200deg, rgb(6, 7, 66), rgb(92, 67, 72));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* FORM CONTAINER (GLASSMORPHISM) */
        form {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
            width: 100%;
            max-width: 450px; /* Disesuaikan agar lebih proporsional */
            min-height: 400px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px); /* Efek kaca */
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        }

        form h1 {
            color: white;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* INPUT WRAPPER */
        form span {
            width: 100%;
            display: flex;
            padding: 12px 15px;
            border-radius: 10px;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        form input {
            background-color: transparent;
            border: none;
            width: 100%;
            color: white;
            outline: none;
            font-size: 16px;
        }

        form input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        /* LINKS CONTAINER */
        .konten {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.9rem;
        }

        .konten a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-weight: bold;
            transition: 0.3s;
        }

        .konten a:hover {
            color: white;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* LOGIN BUTTON */
        form button {
            margin-top: 10px;
            border: none;
            color: white;
            font-weight: bold;
            background-color: rgba(58, 60, 113, 0.6);
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        form button:hover {
            background-color: rgba(80, 83, 155, 0.8);
            transform: translateY(-2px);
        }

        /* RESPONSIVE */
        @media screen and (max-width: 480px) {
            form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <form action="" method="POST">
        <h1>Form Login</h1>
        
        <span>
            <input type="text" name="username" placeholder="masukkan username" required>
        </span>
        
        <span>
            <input type="password" name="password" placeholder="masukkan password" required>
        </span>
        
        <div class="konten">
            <a href="#">buat akun</a>
            <a href="#">lupa password</a>
        </div>
        
        <button type="submit" class="btn-login">Masuk</button>
    </form>

</body>
</html>
